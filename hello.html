<!DOCTYPE html>
<html>
<head>
    <title>Business Suite LLM</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #chatBox { border: 1px solid #ccc; padding: 10px; height: 200px; overflow-y: auto; margin-bottom: 10px; }
    </style>
</head>
<body>

<h2>Business Suite LLM</h2>

<h3>Enter your Gemini API Key</h3>
<input type="password" id="apiKey" placeholder="Paste your API key">
<button onclick="saveKey()">Save Key</button>

<hr>

<h3>Chat</h3>
<div id="chatBox"></div>

<input type="text" id="userInput" placeholder="Ask something..." style="width:70%;">
<button onclick="sendMessage()">Send</button>

<script>
function saveKey() {
    const key = document.getElementById("apiKey").value.trim();
    localStorage.setItem("gemini_key", key);
    alert("API key saved!");
}

function getKey() {
    return localStorage.getItem("gemini_key") || "";
}

async function sendMessage() {
    const text = document.getElementById("userInput").value.trim();
    if (!text) return;

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += `<div><b>You:</b> ${text}</div>`;

    const key = getKey();
    if (!key) {
        chatBox.innerHTML += "<div><b>AI:</b> No API key found.</div>";
        return;
    }
const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + key,
    {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            contents: [{ parts: [{ text: text }] }]
        })
    }
);

   
    const data = await response.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response from Gemini";

    chatBox.innerHTML += `<div><b>AI:</b> ${reply}</div>`;
    document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
