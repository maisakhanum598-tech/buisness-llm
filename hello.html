<!DOCTYPE html>
<html>
<head>
    <title>Business Suite LLM</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #chatBox { 
            border: 1px solid #ccc; 
            padding: 10px; 
            height: 250px; 
            overflow-y: auto; 
            margin-bottom: 10px; 
            background: #fafafa;
        }
        input, button {
            padding: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h2>Business Suite LLM</h2>

<h3>Enter your Gemini API Key</h3>
<input type="password" id="apiKey" placeholder="Paste your API key">
<button onclick="saveKey()">Save Key</button>

<hr>

<h3>Chat</h3>
<div id="chatBox"></div>

<input type="text" id="userInput" placeholder="Ask something..." style="width:70%;">
<button onclick="sendMessage()">Send</button>

<script>
function saveKey() {
    const key = document.getElementById("apiKey").value;
    localStorage.setItem("gemini_api_key", key);
    alert("API Key saved!");
}

async function sendMessage() {
    const key = localStorage.getItem("gemini_api_key");
    const text = document.getElementById("userInput").value;

    if (!key) {
        alert("Please enter your API key first!");
        return;
    }

    if (!text.trim()) return;

    addMessage("You: " + text);

    try {
        const response = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + key,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            }
        );

        const data = await response.json();

        if (data?.candidates?.[0]?.content?.parts?.[0]?.text) {
            addMessage("Gemini: " + data.candidates[0].content.parts[0].text);
        } else {
            addMessage("Gemini: No response from Gemini");
        }

    } catch (error) {
        addMessage("Error: " + error.message);
    }
}

function addMessage(msg) {
    const box = document.getElementById("chatBox");
    box.innerHTML += msg + "<br><br>";
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
